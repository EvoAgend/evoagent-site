<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvoAgent</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 700px;
    }
    h1 {
      font-size: 56px;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 24px;
      font-weight: 400;
      color: #9ca3af;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #d1d5db;
      margin-bottom: 30px;
    }
    .tag {
      display: inline-block;
      padding: 12px 20px;
      border: 1px solid #374151;
      border-radius: 12px;
      color: #a78bfa;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>EvoAgent</h1>
    <h2>Personal AI Execution Agent</h2>
    <p>AI that helps you finish what you start.</p>
    <div class="tag">Coming Soon</div>
  </div>
</body>
</html>
